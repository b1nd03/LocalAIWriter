name: .NET

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore LocalAIWriter.sln

      - name: Build
        run: dotnet build LocalAIWriter.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test LocalAIWriter.sln --configuration Release --no-build
